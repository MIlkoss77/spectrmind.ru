<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR - Генератор скриптов</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0F;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;padding:24px}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
.sub{color:#6B6B7B;margin-bottom:24px;font-size:14px}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.control{display:flex;flex-direction:column;gap:6px}
label{font-size:11px;font-family:monospace;color:#6B6B7B;text-transform:uppercase;letter-spacing:.1em}
select{background:#13131A;border:1px solid rgba(255,255,255,.1);color:#fff;padding:8px 12px;font-size:13px;border-radius:4px;cursor:pointer}
.btn-group{display:flex;gap:6px}
.btn-group button{background:#13131A;border:1px solid rgba(255,255,255,.1);color:#A0A0B0;padding:6px 12px;font-size:12px;font-family:monospace;border-radius:4px;cursor:pointer}
.btn-active{background:#00FFFF!important;color:#000!important;border-color:#00FFFF!important}
.output{background:#13131A;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:20px;position:relative;margin-top:20px}
.output pre{white-space:pre-wrap;font-size:13px;line-height:1.6;color:#A0A0B0}
.copy-btn{position:absolute;top:12px;right:12px;background:#1C1C24;border:1px solid rgba(255,255,255,.1);color:#A0A0B0;padding:6px 14px;font-size:11px;font-family:monospace;border-radius:4px;cursor:pointer}
.copy-btn:hover{border-color:#00FFFF;color:#00FFFF}
.section-title{font-size:11px;font-family:monospace;color:#6B6B7B;text-transform:uppercase;letter-spacing:.1em;margin:20px 0 12px}
.templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.template-card{background:#13131A;border:1px solid rgba(255,255,255,.1);padding:12px;border-radius:4px;cursor:pointer}
.template-card:hover{border-color:rgba(0,255,255,.4)}
.template-card.active{border-color:#00FFFF;background:rgba(0,255,255,.05)}
.template-card p{font-size:13px;font-weight:600}
.template-card span{font-size:11px;color:#6B6B7B}
</style>
</head>
<body>
<h1>Генератор скриптов</h1>
<p class="sub">Рилсы, Карусели, Shorts</p>
<div class="controls">
<div class="control">
<label>Формат</label>
<div class="btn-group" id="formatBtns">
<button class="btn-active" data-val="reels">Reels</button>
<button data-val="carousel">Карусель</button>
<button data-val="shorts">Shorts</button>
</div>
</div>
<div class="control">
<label>Тема</label>
<select id="topic">
<option>Дофаминовый детокс</option>
<option>Архитектура сна</option>
<option>Утренняя рутина</option>
<option>Продуктивность</option>
<option>Концентрация и фокус</option>
<option>Медитация</option>
<option>Ноотропы и добавки</option>
<option>Физика и мозг</option>
<option>Стресс-менеджмент</option>
<option>Когнитивные искажения</option>
</select>
</div>
</div>
<div class="section-title">Тип скрипта</div>
<div class="templates" id="typeTemplates"></div>
<div class="output">
<button class="copy-btn" onclick="copyOutput()">Копировать</button>
<pre id="output"></pre>
</div>
<script>
var TOPICS={
"Дофаминовый детокс":{pain:"твой дофаминовый контур выгорел из-за бесконечного скроллинга",loss:"3 часа продуктивности каждый день",fix:"протокол дофаминового детокса",time:"7 дней",result:"фокус на 3+ часа",myth1:"Кофеин даёт энергию",real1:"он просто блокирует аденозин, а настоящая энергия — от дофамина",myth2:"Нужно больше мотивации",real2:"мотивация — это дофамин, его нужно восстановить, а не игнорировать",before:"зомби до обеда, засыпаю в 2 часа",after:"бодрый с утра, фокус до обеда, засыпаю за 15 минут",habit1:"Проверка телефона в первые 30 минут",why1:"убивает дофаминовый всплеск утра",habit2:"Бесконечный скроллинг ленты",why2:"перегружает дофаминовую систему",habit3:"Мультизадачность",why3:"размывает фокус и истощает нейромедиаторы"},
"Архитектура сна":{pain:"твой режим сна разрушен, мозг не восстанавливается",loss:"50% когнитивных способностей на следующий день",fix:"протокол архитектуры сна",time:"14 дней",result:"засыпание за 15 минут и бодрость без будильника",myth1:"8 часов сна — это обязательно",real1:"оптимум индивидуален, важнее глубина сна",myth2:"Сон можно наверстать в выходные",real2:"циркадный ритм не восстанавливается за 2 дня",before:"засыпаю в 2 часа, встаю разбитым",after:"засыпаю за 15 минут, встаю без будильника",habit1:"СCREEN до сна",why1:"голубой свет подавляет мелатонин",habit2:"Неравномерное время сна",why2:"сбивает циркадный ритм",habit3:"Кофеин после 14:00",why3:"период полувыведения — 6 часов"},
"Утренняя рутина":{pain:"ты убиваешь свою продуктивность в первые 30 минут после пробуждения",loss:"пик кортизола и дофамина утром тратится на телефон",fix:"протокол утренней оптимизации",time:"7 дней",result:"энергия с первого момента дня",myth1:"Кофеин сразу после пробуждения — ок",real1:"нужно подождать 90 минут, пока уйдёт аденозин",myth2:"Телефон утром — innocuous",real2:"проверка ленты убивает дофаминовый всплеск",before:"телефон в кровати, кофеин сразу, зомби до обеда",after:"свет через 10 минут, кофеин через 90, фокус с утра",habit1:"Телефон в кровати",why1:"первые минуты决定ают весь день",habit2:"Нет утреннего света",why2:"мелатонин не выключается",habit3:"Завтрак с сахаром",why3:"инсулиновый скачок → сонливость"},
"Продуктивность":{pain:"ты работаешь много, но эффекта almost нет",loss:"60% рабочего времени уходит на отвлечения и переключения",fix:"система глубокой работы",time:"14 дней",result:"4+ часа непрерывного фокуса в день",myth1:"Мультизадачность повышает продуктивность",real1:"каждое переключение стоит 23 минут восстановления",myth2:"Больше часов = больше сделано",real2:"качество фокуса важнее количества часов",before:"работаю по 10 часов, почти ничего не делаю",after:"работаю 6 часов, делаю в 3 раза больше",habit1:"Нет блоков глубокой работы",why1:"постоянные уведомления разрушают фокус",habit2:"Нет приоритизации",why2:"тратишь время на неважное",habit3:"Нет восстановления",why3:"мозг нуждается в паузах"},
"Концентрация и фокус":{pain:"ты не можешь удерживать внимание дольше 10 минут",loss:"3+ часа продуктивности ежедневно",fix:"протокол восстановления фокуса",time:"7 дней",result:"концентрация 45+ минут без перерывов",myth1:"Фокус — это сила воли",real1:"фокус — это нейрохимия, дофамин и норадреналин",myth2:"Медитация — это расслабление",real2:"медитация — тренировка контроля внимания",before:"не могу читать 10 минут, постоянно отвлекаюсь",after:"читаю по 45 минут, фокус держится весь день",habit1:"Мультизадачность",why1:"размывает внимание",habit2:"Нет физической активности",why2:"运动 увеличивает BDNF и фокус",habit3:"Сахар в рационе",why3:"инсулиновые скачки разрушают концентрацию"},
"Медитация":{pain:"ты не можешь остановить поток мыслей и расслабиться",loss:"хронический стресс разрушает здоровье и продуктивность",fix:"протокол осознанной медитации",time:"30 дней",result:"управление стрессом и ясность ума",myth1:"Медитация — это для духовных людей",real1:"это научно доказанная тренировка мозга",myth2:"Нужно сидеть часами",real2:"10 минут в день дают результат через 2 недели",before:"не могу сидеть 5 минут, ум в панике",after:"спокойно медитирую 20 минут, ясность весь день",habit1:"Нет регулярности",why1:"мозг не адаптируется",habit2:"Ожидание мгновенного эффекта",why2:"результат приходит через 2-3 недели",habit3:"Нет структуры",why3:"без направления теряешь мотивацию"},
"Ноотропы и добавки":{pain:"ты пробовал кучу добавок, но ничего не работает",loss:"деньги на ноотропы без эффекта",fix:"научный подход к ноотропам",time:"14 дней",result:"подобранный стек под твои цели",myth1:"Все ноотропы работают одинаково",real1:"каждый действует на разные нейромедиаторы",myth2:"Чем дороже — тем лучше",real2:"базовые добавки часто эффективнее",before:"тратил 5000р в месяц на добавки без результата",after:"подобрал 3 добавки, эффект через неделю",habit1:"Нет диагностики",why1:"нельзя подбирать без понимания дефицитов",habit2:"Самоназначение",why2:"без анализа крови это лотерея",habit3:"Игнорирование базы",why3:"добавки не заменяют сон и питание"},
"Физика и мозг":{pain:"ты忽略了运动 для мозга, хотя это главный инструмент",loss:"отсутствие运动 снижает BDNF на 40%",fix:"протокол运动 для когнитивных функций",time:"21 день",result:"улучшение памяти, фокуса и настроения",myth1:"Спорт — это для тела",real1:"运动最大的мозга: BDNF, дофамин, серотонин",myth2:"Нужно заниматься по 2 часа",real2:"20 минут интенсивной运动 дают эффект",before:"сижу за компом весь день, мозг туман",after:"30 минут运动 утром, ясность весь день",habit1:"Сидячий образ жизни",why1:"кровоснабжение мозга снижается",habit2:"Нет кардио",why2:"кардио увеличивает объём гиппокампа",habit3:"Тренировки без прогрессии",why3:"мозг адаптируется к стимулу"},
"Стресс-менеджмент":{pain:"хронический стресс убивает твою продуктивность и здоровье",loss:"кортизол разрушает гиппокамп и снижает иммунитет",fix:"протокол управления стрессом",time:"14 дней",result:"снижение кортизола на 30% и спокойствие",myth1:"Стресс — это мотивация",real1:"хронический стресс — это разрушение мозга",myth2:"Нужно просто расслабиться",real2:"нужны конкретные техники регуляции",before:"постоянное напряжение, бессонница, тревога",after:"спокойствие, нормальный сон, ясность",habit1:"Нет техник дыхания",why1:"дыхание — быстрый способ снизить кортизол",habit2:"Нет границ работы",why2:"постоянная доступность = постоянный стресс",habit3:"Нет физической разрядки",why3:"运动 сжигает кортизол"},
"Когнитивные искажения":{pain:"твои решения основываются на ошибках мышления, а не на логике",loss:"когнитивные искажения стоят тебе денег и времени",fix:"протокол анти-искажений",time:"21 день",result:"объективное восприятие и лучшие решения",myth1:"Мы думаем рационально",real1:"мозг использует 30+ искажений ежедневно",myth2:"Осознанность = исцеление",real2:"нужны конкретные техники когнитивной реструктуризации",before:"принимаю решения на эмоциях, жалею потом",after:"замечаю искажения и выбираю осознанно",habit1:"Подтверждение своего мнения",why1:"confirmation bias не даёт увидеть правду",habit2:"Эффект навязывания",why2:"влияние чужого мнения на решения",habit3:"Аффект подтверждения",why3:"эмоции искажают восприятие фактов"}
};
var TYPES={
"problem-solution":{name:"Проблема → Решение",structure:["HOOK (0-1.5с): Провокационный вопрос","PROBLEM (1.5-5с): Опиши боль аудитории","AGITATE (5-10с): Усили проблему","SOLUTION (10-25с): Протокол","CTA (25-30с): Ссылка в шапке"]},
"myths-reality":{name:"Мифы vs Реальность",structure:["HOOK: Тебя обманывают","MYTH 1","REALITY 1","MYTH 2","REALITY 2","CTA: Ссылка в шапке"]},
"before-after":{name:"До / После",structure:["HOOK: Вот что случилось через N дней","BEFORE: Старое состояние","BRIDGE: Что изменил","AFTER: Новое состояние","CTA: Хочешь так же?"]},
"list":{name:"Список (3 совета)",structure:["HOOK: 3 вещи, которые убивают [тему]","ITEM 1: Совет + объяснение","ITEM 2: Совет + объяснение","ITEM 3: Совет + объяснение","BONUS: Ещё протоколов в нейрогайде","CTA: Ссылка в шапке"]},
"storytime":{name:"Storytime",structure:["HOOK: Я чуть не бросил всё","CONTEXT: Расскажи ситуацию","TURNING POINT: Что нашёл","LESSON: Что извлёк","CTA: Весь путь в нейрогайде"]}
};
function gen(topic,type){
var t=TOPICS[topic];
if(type==="problem-solution")return"Знаешь, почему "+t.pain+"?\n\nКаждый день ты теряешь "+t.loss+".\n\n"+t.fix.charAt(0).toUpperCase()+t.fix.slice(1)+" из нейрогайда восстанавливает за "+t.time+". "+t.result.charAt(0).toUpperCase()+t.result.slice(1)+".\n\nСсылка в шапке — забери бесплатно.\n\n#нейрогайд #продуктивность #фокус #концентрация #нейронаука #саморазвитие #дофамин #медитация";
if(type==="myths-reality")return"Мифы и правда о: "+topic+"\n\nМиф: "+t.myth1+".\nПравда: "+t.real1+".\n\nМиф: "+t.myth2+".\nПравда: "+t.real2+".\n\nВсю правду — в нейрогайде. Ссылка в шапке.\n\n#нейрогайд #продуктивность #фокус #концентрация #нейронаука #саморазвитие #дофамин #медитация";
if(type==="before-after")return"До vs После: "+topic+"\n\nДО:\n"+t.before+"\n\nПОСЛЕ ("+t.time+"):\n"+t.after+"\n\nМост: "+t.fix+" из нейрогайда.\n\nХочешь так же? Ссылка в шапке.\n\n#нейрогайд #продуктивность #фокус #концентрация #нейронаука #саморазвитие #дофамин #медитация";
if(type==="list")return"3 вещи, которые мешают: "+topic+"\n\n1. "+t.habit1+" — "+t.why1+".\n2. "+t.habit2+" — "+t.why2+".\n3. "+t.habit3+" — "+t.why3+".\n\nВ нейрогайде ещё протоколы для оптимизации.\n\nСсылка в шапке.\n\n#нейрогайд #продуктивность #фокус #концентрация #нейронаука #саморазвитие #дофамин #медитация";
if(type==="storytime")return"Я чуть не сломался из-за: "+topic+"\n\nБыло: "+t.before+".\n\nПонял: нужно что-то менять.\n\nНашёл: "+t.fix+" из нейрогайда.\n\nЧерез "+t.time+": "+t.after+".\n\nЭто не слабость. Это топливо для мозга.\n\nВесь путь — в нейрогайде. Ссылка в шапке.\n\n#нейрогайд #продуктивность #фокус #концентрация #нейронаука #саморазвитие #дофамин #медитация";
return"";
}
var currentFormat="reels",currentType="problem-solution";
function init(){
var c=document.getElementById("typeTemplates");var keys=Object.keys(TYPES);
for(var i=0;i<keys.length;i++){var k=keys[i],tp=TYPES[k];var d=document.createElement("div");d.className="template-card"+(k===currentType?" active":"");d.setAttribute("data-type",k);d.innerHTML="<p>"+tp.name+"</p><span>"+tp.structure.length+" частей</span>";d.onclick=(function(key){return function(){currentType=key;var cards=document.querySelectorAll(".template-card");for(var j=0;j<cards.length;j++)cards[j].classList.remove("active");this.classList.add("active");render()}})(k);c.appendChild(d)}
document.getElementById("formatBtns").onclick=function(e){var b=e.target;if(!b||!b.hasAttribute("data-val"))return;currentFormat=b.getAttribute("data-val");var btns=document.querySelectorAll("#formatBtns button");for(var j=0;j<btns.length;j++)btns[j].classList.remove("btn-active");b.classList.add("btn-active");render()};
document.getElementById("topic").onchange=function(){render()};
render();
}
function render(){
var topic=document.getElementById("topic").value;
var tp=TYPES[currentType];
var fl=currentFormat==="reels"?"Instagram Reels":currentFormat==="carousel"?"Карусель":"YouTube Shorts";
var si=currentFormat==="carousel"?"5-7 слайдов":"15-30 сек";
var structure="";for(var i=0;i<tp.structure.length;i++)structure+=(i+1)+". "+tp.structure[i]+"\n";
var text=gen(topic,currentType);
var ready=currentFormat==="carousel"?text.split("\n").filter(function(l){return l.length>0}).map(function(s,i){return"Слайд "+(i+1)+": "+s}).join("\n"):text;
document.getElementById("output").textContent="=== "+fl+" ===\nТип: "+tp.name+"\nТема: "+topic+"\nФормат: "+si+"\n\n--- СТРУКТУРА ---\n"+structure+"\n--- ГОТОВЫЙ ТЕКСТ ---\n"+ready;
}
function copyOutput(){navigator.clipboard.writeText(document.getElementById("output").textContent).then(function(){var b=document.querySelector(".copy-btn");b.textContent="Скопировано!";setTimeout(function(){b.textContent="Копировать"},2000)})}
init();
</script>
</body>
</html>
